name: Deploy AdGuard Home

on:
  push:
    branches:
      - main

jobs:
  deploy-adguard:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Create local .env from secrets
        run: |
          cat > apps/adguard-home/compose/.env <<'EOF'
          TZ=Europe/Warsaw
          ADGUARD_PASSWORD=${{ secrets.ADGUARD_PASSWORD }}
          ADGUARD_ADMIN_USER=${{ secrets.ADGUARD_ADMIN_USER }}
          EOF

      - name: Render AdGuard Home config from template
        run: |
          sed -e "s|\${ADGUARD_PASSWORD}|${{ secrets.ADGUARD_PASSWORD }}|g" \
              -e "s|\${ADGUARD_ADMIN_USER}|${{ secrets.ADGUARD_ADMIN_USER }}|g" \
              apps/adguard-home/config/AdGuardHome.yaml.template \
              > apps/adguard-home/config/AdGuardHome.yaml

      - name: Create OVH credentials file
        run: |
          cat > ovh.env <<'EOF'
          OVH_ENDPOINT=${{ secrets.OVH_ENDPOINT }}
          OVH_APPLICATION_KEY=${{ secrets.OVH_APPLICATION_KEY }}
          OVH_APPLICATION_SECRET=${{ secrets.OVH_APPLICATION_SECRET }}
          OVH_CONSUMER_KEY=${{ secrets.OVH_CONSUMER_KEY }}
          EOF

      - name: Create vault password file
        working-directory: ./ansible
        run: echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > vault_pass.txt

      - name: Start AdGuard Home on Docker01
        working-directory: ./ansible
        run: |
          ansible-playbook -i inventory.yml playbooks/adguard.yml -v --vault-password-file vault_pass.txt
