name: Deploy to Proxmox

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - 'ansible/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:


jobs:

  validate:
    name: Validate
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.6

      - name: Terraform Init (no backend)
        working-directory: ./terraform/envs/prod
        run: terraform init -backend=false
      
      - name: Terraform Format Check
        working-directory: ./terraform
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: ./terraform/envs/prod
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Init TFLint
        run: tflint --init

      - name: Run TFLint
        working-directory: ./terraform/envs/prod
        run: tflint

  plan:
    name: Plan
    runs-on: self-hosted
    needs: validate
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      
      - name: Terraform Init
        working-directory: ./terraform/envs/prod
        env:
          TF_BACKEND_INIT_CONFIG: "-backend-config=credentials.auto.tfvars"
        run: terraform init
      
      - name: Terraform Plan
        working-directory: ./terraform/envs/prod
        env:
          TF_VAR_PROXMOX_VE_USERNAME: ${{ secrets.PROXMOX_VE_USERNAME }}
          TF_VAR_PROXMOX_VE_PASSWORD: ${{ secrets.PROXMOX_VE_PASSWORD }}
          TF_VAR_proxmox_api_token_id: ${{ secrets.proxmox_api_token_id }}
          TF_VAR_proxmox_api_token_secret: ${{ secrets.proxmox_api_token_secret }}
        run: terraform plan -out=tfplan
      
      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ./terraform/envs/prod/tfplan

  deploy:
    name: Deploy
    runs-on: self-hosted
    needs: plan
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      
      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ./terraform/envs/prod
      
      - name: Terraform Apply
        working-directory: ./terraform/envs/prod
        run: terraform apply -auto-approve tfplan

  configure:
    name: Configure with Ansible
    runs-on: self-hosted
    needs: deploy
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Ansible & Dependencies
        run: |
          pip install ansible pyyaml
      
      - name: Generate Inventory
        run: python3 generate_inventory.py
      
      - name: Run Ansible Playbooks
        working-directory: ./ansible
        run: |
          ansible-playbook -i inventory.yml playbooks/deploy.yml -v
