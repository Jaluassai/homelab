---
- name: Install packages required by acme.sh
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - git
      - socat
      - openssl
      - ca-certificates
    state: present
    update_cache: yes
    lock_timeout: 600

- name: Ensure acme.sh home directory exists
  ansible.builtin.file:
    path: /root/.acme.sh
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: Create OVH env file for acme.sh on docker01
  ansible.builtin.copy:
    content: |
      OVH_ENDPOINT={{ OVH_ENDPOINT | default(ovh_endpoint, true) }}
      OVH_APPLICATION_KEY={{ OVH_APPLICATION_KEY | default(ovh_application_key, true) }}
      OVH_APPLICATION_SECRET={{ OVH_APPLICATION_SECRET | default(ovh_application_secret, true) }}
      OVH_CONSUMER_KEY={{ OVH_CONSUMER_KEY | default(ovh_consumer_key, true) }}
    dest: /root/.acme.sh/ovh.env
    owner: root
    group: root
    mode: '0600'

- name: Check whether acme.sh repo is already present
  ansible.builtin.stat:
    path: /root/.acme.sh/.git
  register: acmesh_git

- name: Remove existing non-git acme.sh directory
  ansible.builtin.file:
    path: /root/.acme.sh
    state: absent
  when: not acmesh_git.stat.exists

- name: Clone acme.sh repository for installation
  ansible.builtin.git:
    repo: https://github.com/acmesh-official/acme.sh.git
    dest: /root/.acme.sh
    version: master
    force: yes
    update: yes

- name: Install acme.sh from cloned repo
  ansible.builtin.shell: |
    cd /root/.acme.sh
    ./acme.sh --install --home /root/.acme.sh
  args:
    creates: /root/.acme.sh/acme.sh
    executable: /bin/bash

- name: Ensure SSL certificate directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop:
    - /etc/ssl/certs
    - /etc/ssl/private

- name: Remove stale cert path when it is a directory
  ansible.builtin.stat:
    path: /etc/ssl/certs/adguard.crt
  register: adguard_crt_stat

- name: Remove stale cert directory created by Docker bind mount
  ansible.builtin.file:
    path: /etc/ssl/certs/adguard.crt
    state: absent
  when: adguard_crt_stat.stat.exists and adguard_crt_stat.stat.isdir

- name: Remove stale key path when it is a directory
  ansible.builtin.stat:
    path: /etc/ssl/private/adguard.key
  register: adguard_key_stat

- name: Remove stale key directory created by Docker bind mount
  ansible.builtin.file:
    path: /etc/ssl/private/adguard.key
    state: absent
  when: adguard_key_stat.stat.exists and adguard_key_stat.stat.isdir

- name: Issue or renew AdGuard certificate with OVH DNS challenge
  ansible.builtin.shell: |
    set -e
    /root/.acme.sh/acme.sh --home /root/.acme.sh --server letsencrypt --issue --dns dns_ovh -d adguard.caddy.nullbyte.cloud \
      --key-file /etc/ssl/private/adguard.key \
      --fullchain-file /etc/ssl/certs/adguard.crt \
      --reloadcmd "docker compose -f /opt/adguard-home/docker-compose.yml restart adguard"
  args:
    executable: /bin/bash
    creates: /etc/ssl/certs/adguard.crt
  environment:
    PATH: "/root/.acme.sh:{{ ansible_env.PATH }}"
    OVH_ENDPOINT: "{{ OVH_ENDPOINT | default(ovh_endpoint, true) }}"
    OVH_APPLICATION_KEY: "{{ OVH_APPLICATION_KEY | default(ovh_application_key, true) }}"
    OVH_APPLICATION_SECRET: "{{ OVH_APPLICATION_SECRET | default(ovh_application_secret, true) }}"
    OVH_CONSUMER_KEY: "{{ OVH_CONSUMER_KEY | default(ovh_consumer_key, true) }}"
