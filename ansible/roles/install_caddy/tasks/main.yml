- name: Install required packages for Caddy
  apt:
    name:
      - debian-keyring
      - debian-archive-keyring
      - apt-transport-https
      - curl
    state: present
    update_cache: yes

- name: Add Caddy GPG key
  apt_key:
    url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
    dest: /usr/share/keyrings/caddy-stable-archive-keyring.gpg
    mode: 0644
    state: present

- name: Add Caddy repository
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/caddy-stable-archive-keyring.gpg] https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main"
    state: present
    filename: caddy-stable

- name: Update apt cache
  apt:
    update_cache: yes

- name: Install Caddy
  apt:
    name: caddy
    state: present

- name: Hold caddy package
  dpkg_selections:
    name: caddy
    selection: hold

- name: Download Caddy binary
  get_url:
    url: "https://caddyserver.com/api/download?os=linux&arch=amd64&modules=github.com/caddy-dns/ovh"
    dest: /usr/bin/caddy
    mode: '0755'
    force: yes
## TODO: Handler
- name: Restart caddy
  service:
    name: caddy
    state: restarted