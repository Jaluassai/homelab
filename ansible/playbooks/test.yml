---
- name: Deploy Services to Proxmox Containers
  hosts: all
  
  tasks:
    - name: Update package cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Upgrade all packages
      apt:
        upgrade: dist

    - name: Install basic tools
      apt:
        name:
          - curl
          - wget
          - git
          - vim
          - htop
          - net-tools
        state: present

- name: Setup Traefik Reverse Proxy
  hosts: caddy
  
  roles:
    - install_caddy
    - setup_caddy