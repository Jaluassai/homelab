---
- name: Deploy Services to Proxmox Containers
  hosts: all
  
  tasks:
    - name: Update package cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      become: true

    - name: Upgrade all packages
      apt:
        upgrade: dist
      become: true

    - name: Install basic tools
      apt:
        name:
          - curl
          - wget
          - git
          - vim
          - htop
          - net-tools
        state: present
      become: true

- name: Setup Traefik Reverse Proxy
  hosts: caddy
  
  roles:
    - install_caddy
    - setup_caddy

- name: Setup Docker and Portainer
  hosts: docker01
  roles:
    - setup_vm_agent
    # - install_docker
    # - setup_portainer